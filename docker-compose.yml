services:
  backend:
    build: ./backend
    container_name: study-timeline-backend
    env_file:
      - .env.secret
    volumes:
      - db-data:/app/data
    expose:
      - "8000"
    networks:
      - study-timeline-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  nginx:
    image: nginx:alpine
    container_name: study-timeline-nginx
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend/dist:/usr/share/nginx/html:ro
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - study-timeline-network
    restart: unless-stopped

volumes:
  db-data:

networks:
  study-timeline-network:
    driver: bridge
