services:
  backend:
    build: ./backend
    container_name: study-timeline-backend
    env_file:
      - .env.secret
    volumes:
      - db-data:/app/data
    networks:
      - study-timeline-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: study-timeline-frontend
    depends_on:
      - backend
    networks:
      - study-timeline-network
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: study-timeline-nginx
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    networks:
      - study-timeline-network
    restart: unless-stopped

volumes:
  db-data:

networks:
  study-timeline-network:
    driver: bridge
